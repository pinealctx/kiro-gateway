name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for a manual build check; no GitHub Release is created."
        required: true
        default: "manual-check"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.5.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build frontend assets
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        shell: bash
        env:
          RELEASE_VERSION: ${{ github.event_name == 'push' && github.ref_name || inputs.version }}
        run: |
          set -euo pipefail

          VERSION="${RELEASE_VERSION}"
          LDFLAGS="-s -w -X github.com/pinealctx/kiro-gateway/version.Version=${VERSION}"

          mkdir -p dist
          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )

          for platform in "${platforms[@]}"; do
            GOOS="${platform%/*}"
            GOARCH="${platform#*/}"
            EXT=""
            if [ "$GOOS" = "windows" ]; then
              EXT=".exe"
            fi

            PKG="kiro-gateway_${VERSION}_${GOOS}_${GOARCH}"
            OUTDIR="dist/${PKG}"
            mkdir -p "$OUTDIR"

            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -trimpath -ldflags "$LDFLAGS" -o "$OUTDIR/kiro-gateway${EXT}" .

            cp config.example.yaml "$OUTDIR/config.example.yaml"
            cp LICENSE "$OUTDIR/LICENSE"
            cp README.md "$OUTDIR/README.md"
            cp scripts/install.sh "$OUTDIR/install.sh"
            cp scripts/install.ps1 "$OUTDIR/install.ps1"
            perl -pi -e "s/__KIRO_GATEWAY_OS__/${GOOS}/g; s/__KIRO_GATEWAY_ARCH__/${GOARCH}/g" "$OUTDIR/install.sh" "$OUTDIR/install.ps1"
            chmod +x "$OUTDIR/install.sh"

            if [ "$GOOS" = "windows" ]; then
              (cd dist && zip -r "${PKG}.zip" "$PKG")
            else
              tar -czf "dist/${PKG}.tar.gz" -C dist "$PKG"
            fi
          done

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
