name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Build frontend assets
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries from tag
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-s -w -X github.com/pinealctx/kiro-gateway/version.Version=${VERSION}"

          mkdir -p dist
          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )

          for platform in "${platforms[@]}"; do
            GOOS="${platform%/*}"
            GOARCH="${platform#*/}"
            EXT=""
            if [ "$GOOS" = "windows" ]; then
              EXT=".exe"
            fi

            PKG="kiro-gateway_${VERSION}_${GOOS}_${GOARCH}"
            OUTDIR="dist/${PKG}"
            mkdir -p "$OUTDIR"

            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -trimpath -ldflags "$LDFLAGS" -o "$OUTDIR/kiro-gateway${EXT}" .

            cp config.example.yaml "$OUTDIR/config.example.yaml"
            cp LICENSE "$OUTDIR/LICENSE"
            cp README.md "$OUTDIR/README.md"
            cp scripts/install.sh "$OUTDIR/install.sh"
            cp scripts/install.ps1 "$OUTDIR/install.ps1"
            perl -pi -e "s/__KIRO_GATEWAY_OS__/${GOOS}/g; s/__KIRO_GATEWAY_ARCH__/${GOARCH}/g" "$OUTDIR/install.sh" "$OUTDIR/install.ps1"
            chmod +x "$OUTDIR/install.sh"

            if [ "$GOOS" = "windows" ]; then
              (cd dist && zip -r "${PKG}.zip" "$PKG")
            else
              tar -czf "dist/${PKG}.tar.gz" -C dist "$PKG"
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
