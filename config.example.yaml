# Kiro Gateway configuration example.
# Accounts are managed dynamically via the Admin API:
#   POST   /admin/accounts        — add an account
#   GET    /admin/accounts        — list accounts
#   PUT    /admin/accounts/:id    — update an account
#   DELETE /admin/accounts/:id    — remove an account
#
# API keys must bind to one or more accounts with kiro_accounts
# and a kiro_default_account. Runtime account selection:
#   /v1/messages                         -> key default account
#   /v1/chat/completions                -> key default account
#   /a/{kiro_account}/v1/chat/completions
#   /a/{kiro_account}/v1/messages

server:
  host: "0.0.0.0"
  port: 8080
  log_level: "info"   # debug | info | warn | error
  log_format: "console" # console | json
  cors_origins: []    # empty = allow all

auth:
  admin_key: ""        # separate key for /admin/* endpoints; empty = generated on startup
  admin_local_only: true # restrict /admin/* to localhost even when runtime APIs listen on 0.0.0.0

defaults:
  health_check_enabled: true
  health_check_seconds: 60

tenant:
  db_path: "kiro-gateway.db"

notifications:
  teams:
    enabled: false
    # Use a Microsoft Teams Workflows / Power Automate webhook URL.
    # You can also set TEAMS_WEBHOOK_URL and omit this value.
    webhook_url: "${TEAMS_WEBHOOK_URL}"
    account_thresholds: [90, 100] # send once when accounts cross each percentage
    total_thresholds: [90, 100]   # send once when all accounts combined cross each percentage
    daily_times: ["09:00", "18:00"] # one or two HH:MM local-time summaries
    timezone: "Asia/Shanghai"
    check_interval_seconds: 600
